# LLM Financial Stability Bench — Configuration

# Model Configuration
# To use Claude Haiku: provider: "anthropic", name: "claude-haiku-4-5-20251001"
# To use ChatGPT:      provider: "openai",    name: "gpt-5.4-nano"
model:
  provider: "openai"
  name: "gpt-5.4-nano"
  max_tokens: 1024

# Evaluation Parameters
evaluation:
  temperatures: [0.0, 0.3, 0.5, 0.7, 1.0]
  runs_per_combination: 10
  templates:
    - "direct_extraction"
    - "contextual_extraction"
    - "comparative"
    - "qualitative"

# Quick Mode Overrides (--quick flag)
quick_mode:
  temperatures: [0.0]
  runs_per_combination: 3
  max_facts: 6
  templates:
    - "direct_extraction"

# Scoring Configuration
scoring:
  embedding_model: "all-MiniLM-L6-v2"
  hallucination_tolerance: 0.05
  composite_weights:
    semantic_consistency: 0.30
    factual_consistency: 0.40
    hallucination_rate: 0.30

# Flagging Thresholds
flagging:
  green_threshold: 0.75
  yellow_threshold: 0.50

# Checkpointing
checkpoint:
  save_interval: 50
  directory: "results"

# API Cost Estimation
# Prices are auto-filled from the MODEL_PRICING registry in src/config.py
# based on model.name above. Set explicitly here to override.
#
# Reference (USD per 1K tokens):
#   Claude Haiku 4.5:  input: 0.001,    output: 0.005
#   Claude Haiku 3.5:  input: 0.0008,   output: 0.004
#   Claude Haiku 3:    input: 0.00025,  output: 0.00125
#   Claude Sonnet 4.x: input: 0.003,    output: 0.015
#   Claude Opus 4.x:   input: 0.005,    output: 0.025
#   GPT-5.4:           input: 0.0025,   output: 0.015
#   GPT-5.4 mini:      input: 0.00075,  output: 0.0045
#   GPT-5.4 nano:      input: 0.0002,   output: 0.00125
#
# avg token counts measured from the actual 6,600-call benchmark run.
cost:
  avg_input_tokens: 36
  avg_output_tokens: 35
  # Uncomment to override auto-resolved prices:
  # price_per_1k_input: 0.0002
  # price_per_1k_output: 0.00125
  confirmation_threshold: 1.0

# API Resilience
api:
  timeout_seconds: 30
  max_retries: 5
  base_backoff_seconds: 1.0
  max_backoff_seconds: 60.0
  rate_limit_rpm: 50
